<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爸爸陪你做暑假作业</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <section id="home-page" class="page active">
            <header class="hero">
                <div class="mascot">📚</div>
                <h1>爸爸陪你做暑假作业</h1>
                <p class="subtitle">一个爸爸陪孩子写暑假作业时做的小网站，也分享给其他小朋友一起学习</p>
            </header>
            <div id="category-buttons" class="category-buttons"></div>
        </section>

        <!-- 做题页 -->
        <section id="quiz-page" class="page">
            <header class="quiz-header">
                <button id="back-btn" class="btn btn-back">← 返回首页</button>
                <h2 id="quiz-title">练习中</h2>
                <div id="progress" class="progress">第 1 / 10 题</div>
            </header>

            <div class="quiz-card">
                <div id="question-text" class="question-text"></div>
                <div id="options" class="options"></div>
                <div id="feedback" class="feedback hidden">
                    <div id="feedback-icon" class="feedback-icon"></div>
                    <div id="feedback-text" class="feedback-text"></div>
                    <div id="explanation" class="explanation">
                        <strong id="answer-label"></strong>
                        <p id="explanation-text"></p>
                    </div>
                    <button id="next-btn" class="btn btn-next hidden" type="button">下一题 →</button>
                </div>
            </div>
        </section>

        <!-- 完成页 -->
        <section id="done-page" class="page">
            <div class="done-card">
                <div class="done-icon">🎉</div>
                <h2>全部完成啦！</h2>
                <p id="done-score" class="done-score"></p>
                <p class="done-message">太棒了！你真是数学小能手！</p>
                <button id="restart-btn" class="btn btn-primary">再来一遍</button>
                <button id="home-btn" class="btn btn-secondary">返回首页</button>
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
